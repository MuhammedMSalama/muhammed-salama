<svg xmlns="http://www.w3.org/2000/svg">
    <!--
      Shared icon sprite. Every symbol below is referenced from the page
      fragments in /pages via:
        <svg class="..." width=".." height=".."><use href="assets/icons/sprite.svg#icon-x"></use></svg>
      Symbols intentionally carry no fill/stroke of their own — the calling
      <svg> wrapper sets fill/stroke/stroke-width, so styling matches
      whatever the original inline icon used (currentColor or a fixed hex).
      One-off decorative illustrations used exactly once in a single page
      (hero's avatar/badge glyphs, each project's placeholder icon) are kept
      inline in their own fragment instead of here, since sprite-ifying a
      true one-off adds indirection without removing any duplication.
    -->

