<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Muhammed Salama — Laravel Backend Engineer</title>

    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
          rel="stylesheet"/>

    <!--
      Tailwind CDN + its runtime config are intentionally kept inline here
      rather than moved to a JS module. Tailwind's Play CDN script needs
      `tailwind.config` set synchronously, in document order, before it
      scans the page for utility classes — moving it to an external,
      separately-loaded module risks the utility classes (colors, shadows,
      fonts used throughout this page) silently failing to generate, which
      would break the design. Every other script is a proper ES module
      under assets/js/. See README.md for more on this trade-off.
    -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        base: '#0F172A',
                        surface: '#1B2436',
                        raised: '#232E44',
                        line: '#263349',
                        accent: '#22C55E',
                        blue: '#3B82F6',
                        amber: '#F59E0B',
                        muted: '#94A3B8',
                        subtle: '#64748B',
                    },
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui'],
                        mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
                    },
                    boxShadow: {
                        card: '0 1px 2px 0 rgb(0 0 0 / 0.4), 0 0 0 1px rgb(255 255 255 / 0.03)',
                        lift: '0 20px 40px -12px rgb(0 0 0 / 0.55)',
                        glow: '0 0 0 1px rgb(34 197 94 / 0.35), 0 0 40px -8px rgb(34 197 94 / 0.35)',
                    },
                },
            },
        };
    </script>

    <!-- Loaded in cascade order: tokens, then animations/components/utilities
         that consume those tokens, then base layer, then responsive overrides. -->
    <link rel="stylesheet" href="assets/css/variables.css"/>
    <link rel="stylesheet" href="assets/css/animations.css"/>
    <link rel="stylesheet" href="assets/css/components.css"/>
    <link rel="stylesheet" href="assets/css/utilities.css"/>
    <link rel="stylesheet" href="assets/css/style.css"/>
    <link rel="stylesheet" href="assets/css/responsive.css"/>
</head>

<body class="bg-base text-slate-200 font-sans antialiased selection:bg-accent/30 selection:text-white">

<!--
  This project loads pages/*.html into <main id="app"> at runtime — see
  assets/js/app.js. That requires a local HTTP server (fetch() of local
  files is blocked under file://). Run e.g. `npx serve .` or
  `python3 -m http.server` from the project root, then open the printed
  localhost URL. Opening this file directly will show only the navbar.
-->

<!-- ============ NAVBAR ============
     Stays here (not a loaded fragment) per the requested architecture:
     index.html owns Head, Navbar, the <main> mount point, and script
     imports — nothing else. -->
<header id="navbar" class="fixed top-0 inset-x-0 z-50 transition-all duration-300 border-b border-transparent">
    <nav class="max-w-[1240px] mx-auto px-6 lg:px-10 h-[76px] flex items-center justify-between">
        <a href="#" class="flex items-center gap-2.5 shrink-0">
            <span class="h-8 w-8 rounded-lg bg-gradient-to-br from-accent to-blue flex items-center justify-center text-base font-bold text-slate-950">M</span>
            <span class="font-semibold tracking-tight text-white">Muhammed<span class="text-muted">.dev</span></span>
        </a>

        <div class="hidden lg:flex items-center gap-9 text-[14.5px] text-muted">
            <a href="#about" class="nav-link hover:text-white transition-colors">About</a>
            <a href="#experience" class="nav-link hover:text-white transition-colors">Experience</a>
            <a href="#highlights" class="nav-link hover:text-white transition-colors">Highlights</a>
            <a href="#stack" class="nav-link hover:text-white transition-colors">Expertise</a>
            <a href="#projects" class="nav-link hover:text-white transition-colors">Projects</a>
            <a href="#contact" class="nav-link hover:text-white transition-colors">Contact</a>
        </div>

        <div class="hidden lg:flex items-center gap-3">
            <a href="#contact"
               class="inline-flex items-center gap-2 rounded-lg bg-accent text-slate-950 text-[14px] font-semibold px-4 py-2.5 hover:bg-accent/90 hover:-translate-y-0.5 transition-all duration-200 shadow-card">
                Let's Talk
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"
                     stroke-linecap="round">
                    <use href="assets/icons/sprite.svg#icon-arrow-right"></use>
                </svg>
            </a>
        </div>

        <button id="menuBtn" class="lg:hidden text-white p-2 -mr-2">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round">
                <use href="assets/icons/sprite.svg#icon-menu"></use>
            </svg>
        </button>
    </nav>

    <!-- Mobile menu -->
    <div id="mobileMenu" class="lg:hidden hidden bg-surface border-t border-line">
        <div class="px-6 py-6 flex flex-col gap-5 text-[15px] text-muted">
            <a href="#about" class="hover:text-white transition-colors">About</a>
            <a href="#experience" class="hover:text-white transition-colors">Experience</a>
            <a href="#highlights" class="hover:text-white transition-colors">Highlights</a>
            <a href="#stack" class="hover:text-white transition-colors">Expertise</a>
            <a href="#projects" class="hover:text-white transition-colors">Projects</a>
            <a href="#contact" class="hover:text-white transition-colors">Contact</a>
            <a href="#contact" class="mt-2 text-center rounded-lg bg-accent text-slate-950 font-semibold px-4 py-3">Let's
                Talk</a>
        </div>
    </div>
</header>

<!-- ============ MAIN ============
     Empty on load; assets/js/app.js fetches every fragment in /pages
     and injects them here, in order, via assets/js/components.js. -->
<main id="app"></main>

<script type="module" src="assets/js/app.js"></script>

</body>
</html>
